name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from Actions UI

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cut off an in-progress deploy

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # No repo checkout needed — the deploy operates on the VPS clone.
      # All logic lives in scripts/deploy.sh (run by real bash on the server)
      # to avoid appleboy inline-script quoting issues.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd /opt/mvpn
            git fetch origin main
            git reset --hard origin/main
            bash scripts/deploy.sh "${{ github.event.before }}"
