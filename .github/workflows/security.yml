name: Security

on:
  workflow_dispatch: # manual only — no push/PR/schedule auto-runs, no failure emails

jobs:
  govulncheck:
    name: govulncheck (${{ matrix.mod }})
    runs-on: ubuntu-latest
    # Advisory: govulncheck flags Go *stdlib* CVEs tied to the toolchain patch
    # level, so a fresh Go release would otherwise hard-fail every push until we
    # bump. Report findings in the Actions tab, don't block / email. We keep the
    # build images on the latest Go 1.26 patch to actually carry the fixes.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        mod: [api, connect, awg-server]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        working-directory: ./${{ matrix.mod }}
        run: govulncheck ./...

  gosec:
    name: gosec (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true # noisy SAST — report, don't block
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: gosec (medium+)
        run: |
          for d in api connect awg-server; do
            echo "::group::gosec $d"
            (cd "$d" && gosec -severity medium -confidence medium ./...) || true
            echo "::endgroup::"
          done

  npm-audit:
    name: npm audit (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [frontend, bot]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: npm audit (prod deps, high+)
        working-directory: ./${{ matrix.dir }}
        run: npm audit --omit=dev --audit-level=high
