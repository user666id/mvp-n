name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # weekly Monday 06:00 UTC
  workflow_dispatch:

jobs:
  govulncheck:
    name: govulncheck (${{ matrix.mod }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mod: [api, connect, awg-server]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        working-directory: ./${{ matrix.mod }}
        run: govulncheck ./...

  gosec:
    name: gosec (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true # noisy SAST — report, don't block
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: gosec (medium+)
        run: |
          for d in api connect awg-server; do
            echo "::group::gosec $d"
            (cd "$d" && gosec -severity medium -confidence medium ./...) || true
            echo "::endgroup::"
          done

  npm-audit:
    name: npm audit (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [frontend, bot]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm audit (prod deps, high+)
        working-directory: ./${{ matrix.dir }}
        run: npm audit --omit=dev --audit-level=high
