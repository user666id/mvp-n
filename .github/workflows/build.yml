name: Build

on:
  workflow_dispatch: # manual only — no push/PR auto-runs, no failure emails

jobs:
  go-build:
    name: Go build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, connect, awg-server]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: |
          go mod download
          go build -ldflags="-s -w" -o ./${{ matrix.service }} .
          ls -lh ./${{ matrix.service }}

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        run: npm run build

      - name: Check dist/
        working-directory: ./frontend
        run: |
          ls -lh dist/
          du -sh dist/
