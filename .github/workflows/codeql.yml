name: CodeQL

on:
  workflow_dispatch: # manual only — no push/PR/schedule auto-runs, no failure emails

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # build-mode: none — CodeQL extracts from source without compiling, which
        # avoids the multi-Go-module build dance (api/connect/awg-server).
        include:
          - language: go
            build-mode: none
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
