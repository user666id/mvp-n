version: 2
updates:
  # Go modules (one per service)
  - package-ecosystem: gomod
    directory: /api
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
  - package-ecosystem: gomod
    directory: /connect
    schedule: { interval: weekly }
  - package-ecosystem: gomod
    directory: /awg-server
    schedule: { interval: weekly }
  # npm
  - package-ecosystem: npm
    directory: /frontend
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
  - package-ecosystem: npm
    directory: /bot
    schedule: { interval: weekly }
  # CI actions themselves
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
