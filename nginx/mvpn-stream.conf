# stream block in main nginx.conf
stream {
    log_format mvpn '$remote_addr [$time_local] sni="$ssl_preread_server_name" backend="$mvpn_backend" bytes_sent=$bytes_sent';

    map $ssl_preread_server_name $mvpn_backend {
        # Our web subdomains go to internal nginx HTTP server
        cdn.mvp-n.net      127.0.0.1:8443;
        app.mvp-n.net      127.0.0.1:8443;
        connect1.mvp-n.net 127.0.0.1:8443;
        legal.mvp-n.net    127.0.0.1:8443;
        # VPN clients send www.cloudflare.com (REALITY masking)
        www.cloudflare.com 127.0.0.1:43000;
        # Anything else also routes to xray
        default            127.0.0.1:43000;
    }

    server {
        listen 443;
        listen [::]:443;
        proxy_pass           $mvpn_backend;
        ssl_preread          on;
        preread_timeout      30s;
        proxy_connect_timeout 10s;
        proxy_timeout         1h;
        tcp_nodelay          on;
        # Privacy: don't log per-connection client IP / SNI on a VPN service.
        access_log           off;
    }
}
