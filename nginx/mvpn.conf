# mvp-n.net — production nginx config (with CORS for /api/)
#
# Security headers are added per-block because a location with its own
# `add_header` drops headers inherited from the server scope, so they must be
# repeated wherever another add_header is present. HSTS is safe here: every
# web domain is HTTPS-only (the :80 block 301-redirects to HTTPS).
#
# access_log is off for the web vhosts: this is a privacy VPN service, so we
# don't keep a per-request record of users' IPs and API calls.

server {
    listen 127.0.0.1:8443 ssl http2;

    server_name connect.mvp-n.net;

    ssl_certificate     /etc/ssl/cloudflare/mvp-n.net.pem;
    ssl_certificate_key /etc/ssl/cloudflare/mvp-n.net.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    access_log off;
    client_max_body_size 1m;

    location /api/ {
        add_header Access-Control-Allow-Origin  "https://app.mvp-n.net" always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Max-Age       "86400" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;

        if ($request_method = OPTIONS) { return 204; }

        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host              gw.mvp-n.net;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
    }

    location / {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }
}

server {
    listen 127.0.0.1:8443 ssl http2;

    server_name app.mvp-n.net;

    ssl_certificate     /etc/ssl/cloudflare/mvp-n.net.pem;
    ssl_certificate_key /etc/ssl/cloudflare/mvp-n.net.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    access_log off;

    # Relative Location headers: nginx listens on internal :8443 (behind the SNI
    # router), so an absolute redirect would leak that port to the client
    # (https://app.mvp-n.net:8443/v2/). Relative "/v2/" keeps the public URL.
    absolute_redirect off;

    location ^~ /v2/assets/ {
        alias /var/www/mini-app-f7/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }
    location ^~ /v2/ {
        alias /var/www/mini-app-f7/;
        try_files $uri $uri/ /v2/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        # CSP — the Mini App's only token store is localStorage, so a strict CSP
        # is the backstop against XSS-based token theft. Scoped to exactly what the
        # built app loads: own assets, Telegram SDK, Google Fonts, and the API
        # (gw/connect). 'unsafe-inline' is for styles only (chart/components inline
        # style attrs); scripts stay 'self'+telegram (Vite emits external modules,
        # no inline scripts). frame-ancestors keeps it framable only inside Telegram.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://telegram.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://gw.mvp-n.net https://connect.mvp-n.net; frame-ancestors https://web.telegram.org https://*.telegram.org; base-uri 'self'; object-src 'none'; form-action 'self'" always;
        add_header Referrer-Policy "no-referrer" always;
    }
    location / { return 301 /v2/; }
}



# legal.mvp-n.net — static legal documents (Terms / Privacy), served on their own
# subdomain so they have clean, shareable URLs (legal.mvp-n.net/terms, /privacy)
# decoupled from the Mini App. Files live in the same web root that autodeploy
# populates (/var/www/mini-app-f7/: terms.html, privacy.html, legal.js); only
# those three paths are exposed here. No app CSP needed — legal.js is external.
server {
    listen 127.0.0.1:8443 ssl http2;
    server_name legal.mvp-n.net;

    ssl_certificate     /etc/ssl/cloudflare/mvp-n.net.pem;
    ssl_certificate_key /etc/ssl/cloudflare/mvp-n.net.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    access_log off;
    absolute_redirect off;
    root /var/www/mini-app-f7;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location = /terms    { try_files /terms.html =404; }
    location = /privacy  { try_files /privacy.html =404; }
    location = /legal.js { try_files /legal.js =404; expires 1h; }
    location = /         { return 301 /terms; }
    location /           { return 404; }
}

server {
    listen 80;
    listen [::]:80;
    server_name app.mvp-n.net connect.mvp-n.net gw.mvp-n.net legal.mvp-n.net;
    return 301 https://$host$request_uri;
}
server {
    listen 127.0.0.1:8443 ssl http2;
    server_name gw.mvp-n.net;
    ssl_certificate     /etc/ssl/cloudflare/mvp-n.net.pem;
    ssl_certificate_key /etc/ssl/cloudflare/mvp-n.net.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    access_log off;
    client_max_body_size 1m;
    add_header Access-Control-Allow-Origin  "https://app.mvp-n.net" always;
    add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Access-Control-Max-Age       "86400" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    if ($request_method = OPTIONS) { return 204; }
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
    }
}
