# mvp-n.net — production nginx config (with CORS for /api/)

server {
    listen 127.0.0.1:8443 ssl http2;

    server_name connect.mvp-n.net;

    ssl_certificate     /etc/ssl/cloudflare/mvp-n.net.pem;
    ssl_certificate_key /etc/ssl/cloudflare/mvp-n.net.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location /api/ {
        add_header Access-Control-Allow-Origin  "https://app.mvp-n.net" always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Max-Age       "86400" always;

        if ($request_method = OPTIONS) { return 204; }

        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host              gw.mvp-n.net;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }
}

server {
    listen 127.0.0.1:8443 ssl http2;

    server_name app.mvp-n.net;

    ssl_certificate     /etc/ssl/cloudflare/mvp-n.net.pem;
    ssl_certificate_key /etc/ssl/cloudflare/mvp-n.net.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location ^~ /v2/assets/ {
        alias /var/www/mini-app-f7/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location ^~ /v2/ {
        alias /var/www/mini-app-f7/;
        try_files $uri $uri/ /v2/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
    location / { return 301 /v2/; }
}



server {
    listen 80;
    listen [::]:80;
    server_name app.mvp-n.net connect.mvp-n.net gw.mvp-n.net;
    return 301 https://$host$request_uri;
}
server {
    listen 127.0.0.1:8443 ssl http2;
    server_name gw.mvp-n.net;
    ssl_certificate     /etc/ssl/cloudflare/mvp-n.net.pem;
    ssl_certificate_key /etc/ssl/cloudflare/mvp-n.net.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    add_header Access-Control-Allow-Origin  "https://app.mvp-n.net" always;
    add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Access-Control-Max-Age       "86400" always;
    if ($request_method = OPTIONS) { return 204; }
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
    }
}
